name: E2E tests

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: e2e-test

jobs:
  prettier:
    name: Prettier
    strategy:
      fail-fast: false
      matrix:
        node:
          - "latest"
          - "22"
        additional-options:
          - "--runner jest-light-runner"
          - "--runner jest-light-runner/child-process"
          - "--runInBand"
    env:
      YARN_ENABLE_IMMUTABLE_INSTALLS: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          path: jest-light-runner

      - name: Checkout "prettier"
        uses: actions/checkout@v7
        with:
          repository: prettier/prettier
          path: e2e-test

      - name: Setup Node.js
        uses: actions/setup-node@v6

      - name: Prepare
        run: |
          yarn up jest-light-runner@file:../jest-light-runner
          yarn build

      - name: Run tests
        env:
          FULL_TEST: true
        run: |
          yarn c8 yarn jest ${{ matrix.additional-options }}

  babel:
    name: Babel
    strategy:
      fail-fast: false
      matrix:
        node:
          - "latest"
          - "22"
        additional-options:
          - "--runner jest-light-runner"
          - "--runner jest-light-runner/child-process"
          - "--runInBand"
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: latest
          check-latest: true

      - name: Checkout
        uses: actions/checkout@v7
        with:
          path: jest-light-runner

      - name: Checkout "babel"
        uses: actions/checkout@v7
        with:
          repository: babel/babel
          path: e2e-test

      - name: Prepare
        run: |
          yarn up jest-light-runner@file:../jest-light-runner
          # Disable Babel's setupFilesAfterEnv
          echo "" > test/testSetupFile.js

      - name: Run tests for Node.js
        run: |
          make -j test-ci-coverage
          yarn test:esm ${{ matrix.additional-options }}
